<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDnet人格测试 - 后台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0052D9',
            secondary: '#FF6B8B',
            accent: '#FFD93D',
            dark: '#2C3E50',
            light: '#F8F9FA'
          },
          fontFamily: {
            sans: ['PingFang SC', 'Microsoft YaHei', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .text-shadow-sm {
        text-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      .btn-shadow {
        box-shadow: 0 8px 20px rgba(0, 82, 217, 0.25);
      }
      .btn-hover {
        transition: all 0.3s ease;
      }
      .btn-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(0, 82, 217, 0.3);
      }
      .card-shadow {
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- 管理员登录模态框 -->
  <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa fa-lock text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">管理员登录</h2>
        <p class="text-gray-600">请输入管理员密码以访问后台</p>
      </div>
      <div class="space-y-4">
        <input type="password" id="adminPassword" placeholder="请输入管理员密码" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
        <button id="loginBtn" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-primary/90 transition-colors">
          登录
        </button>
        <p id="loginError" class="text-red-500 text-sm text-center hidden">密码错误，请重试</p>
      </div>
    </div>
  </div>

  <!-- 导航栏 -->
  <nav class="bg-primary text-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-xl font-bold">DDnet人格测试 - 后台管理</h1>
      <div>
        <button id="refreshBtn" class="px-4 py-2 bg-white text-primary rounded-lg font-medium hover:bg-gray-100 transition-colors">
          <i class="fa fa-refresh mr-2"></i> 刷新数据
        </button>
        <button id="logoutBtn" onclick="logout()" class="ml-2 px-4 py-2 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 transition-colors">
          <i class="fa fa-sign-out mr-2"></i> 登出
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区（默认隐藏，需登录后显示） -->
  <main id="adminContent" class="container mx-auto px-4 py-8 hidden">
    <!-- 统计信息 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white rounded-xl shadow-md p-6">
        <h3 class="text-gray-500 mb-2">总用户数</h3>
        <p id="totalUsers" class="text-3xl font-bold text-primary">0</p>
      </div>
      <div class="bg-white rounded-xl shadow-md p-6">
        <h3 class="text-gray-500 mb-2">今日新增</h3>
        <p id="todayUsers" class="text-3xl font-bold text-secondary">0</p>
      </div>
      <div class="bg-white rounded-xl shadow-md p-6">
        <h3 class="text-gray-500 mb-2">人格类型数</h3>
        <p id="personalityTypes" class="text-3xl font-bold text-accent">0</p>
      </div>
    </div>

    <!-- 日期范围清除 -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4 text-gray-700">
        <i class="fa fa-calendar mr-2"></i> 清除数据
      </h3>
      <div class="flex flex-col md:flex-row gap-4 items-end">
        <div class="flex-1">
          <label class="block text-gray-700 mb-2">删除日期前</label>
          <input type="date" id="beforeDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        <div class="flex-1">
          <label class="block text-gray-700 mb-2">删除日期后</label>
          <input type="date" id="afterDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        <div class="flex gap-2">
          <button id="clearRangeBtn" class="px-4 py-2 bg-amber-600 text-white rounded-lg font-medium hover:bg-amber-700 transition-colors">
            <i class="fa fa-trash mr-2"></i> 清除数据
          </button>
          <button id="cancelClearBtn" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-400 transition-colors">
            <i class="fa fa-times mr-2"></i> 取消
          </button>
        </div>
      </div>
      <p class="text-sm text-gray-500 mt-3">
        <i class="fa fa-info-circle mr-1"></i>
        只选"删除日期前"：删除该日期之前的所有数据；
        只选"删除日期后"：删除该日期之后的所有数据；
        两个都选：删除日期范围内的所有数据
      </p>
    </div>

    <!-- 筛选和搜索 -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
      <div class="flex flex-col md:flex-row gap-4">
        <div class="flex-1">
          <label class="block text-gray-700 mb-2">人格类型</label>
          <select id="personalityFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            <option value="all">全部</option>
            <!-- 人格类型将通过JS动态添加 -->
          </select>
        </div>
        <div class="flex-1">
          <label class="block text-gray-700 mb-2">搜索</label>
          <div class="relative">
            <input type="text" id="searchInput" placeholder="搜索游戏ID或用户名" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            <button id="searchBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-primary">
              <i class="fa fa-search"></i>
            </button>
          </div>
        </div>
        <div class="flex items-end">
          <button id="exportBtn" class="px-4 py-2 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition-colors">
            <i class="fa fa-download mr-2"></i> 导出数据
          </button>
        </div>
      </div>
    </div>

    <!-- 用户数据表格 -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-100">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">头像/游戏ID</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">人格类型</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提交时间</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="bg-white divide-y divide-gray-200">
            <!-- 用户数据将通过JS动态添加 -->
            <tr>
              <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                <i class="fa fa-spinner fa-spin text-2xl mb-4 block"></i>
                <p>加载中...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <!-- 分页 -->
      <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex items-center justify-between">
        <div class="text-sm text-gray-500">
          显示 <span id="showingFrom">1</span> 到 <span id="showingTo">10</span> 共 <span id="totalCount">0</span> 条记录
        </div>
        <div class="flex space-x-2">
          <button id="prevPage" class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            上一页
          </button>
          <button id="nextPage" class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            下一页
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 交互JS -->
  <script>
    // 全局变量
    const API_BASE = 'https://ayin-production.up.railway.app'; // 后端API地址
    const FAKE_PASSWORD = 'DD1314'; // 伪造的管理员密码（诱饵）
    function getRealPassword() {
      // 真实密码通过简单混淆
      const _1 = 'W';
      const _2 = 'Z';
      const _3 = 'R';
      const _4 = 'w';
      const _5 = 'z';
      const _6 = 'r';
      const _7 = '0';
      const _8 = '1';
      const _9 = '1';
      const _10 = '2';
      const _11 = '0';
      const _12 = '5';
      return _1 + _2 + _3 + _4 + _5 + _6 + _7 + _8 + _9 + _10 + _11 + _12;
    }
    const ADMIN_PASSWORD = getRealPassword();
    let users = [];
    let filteredUsers = [];
    let currentPage = 1;
    const pageSize = 10;
    let personalityTypes = [];
    let isLoggedIn = false;
    
    // 人格类型到头像的映射
    const personalityAvatarMap = {
      'Emotional Player': '拿刀.png',
      'Hidden Personality': '彩虹.png',
      'Challenge Avoider': 'ximi.png',
      'Lying Flat Fish': '咸鱼.png',
      'Rusher': '泡泡.png',
      'Bald Grinder': '布偶.png',
      'Balanced Player': '猫.png',
      'Rational Thinker': '美西螈.png',
      'Responsible Anchor': '石像.png',
      'Self-Deprecating Humorist': '大dd.png',
      'Confident Competitor': '漂亮.png',
      'Carry Goat': '小狗.png',
      'Friend Collector': '飞鼠.png',
      'Team Supporter': '法师.png',
      'Jokester': '狐狸.png',
      '键盘粉碎者': '拿刀.png',
      '收集狂': '彩虹.png',
      '摆烂仙人': 'ximi.png',
      '躺平咸鱼': '咸鱼.png',
      '偷跑Tee': '泡泡.png',
      '独攀者': '布偶.png',
      '中立者': '猫.png',
      '策略大师': '美西螈.png',
      '背锅侠': '石像.png',
      '小丑竟是我': '大dd.png',
      '装杯带师': '漂亮.png',
      '带飞者': '小狗.png',
      '扩列狂魔': '飞鼠.png',
      '团队依赖户': '法师.png',
      '整活艺术家': '狐狸.png'
    };

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否已登录
      checkLoginStatus();
      bindEvents();
    });

    // 检查登录状态
    function checkLoginStatus() {
      const savedLogin = localStorage.getItem('adminLoggedIn');
      const savedTime = localStorage.getItem('adminLoginTime');
      const now = Date.now();

      // 登录状态有效期24小时
      if (savedLogin === 'true' && savedTime && (now - parseInt(savedTime)) < 24 * 60 * 60 * 1000) {
        showAdminContent();
      } else {
        showLoginModal();
      }
    }

    // 显示登录模态框
    function showLoginModal() {
      document.getElementById('loginModal').classList.remove('hidden');
      document.getElementById('adminContent').classList.add('hidden');
      isLoggedIn = false;
    }

    // 显示管理内容
    function showAdminContent() {
      document.getElementById('loginModal').classList.add('hidden');
      document.getElementById('adminContent').classList.remove('hidden');
      isLoggedIn = true;
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminLoginTime', Date.now().toString());
      loadUsers();
    }

    // 登录验证
    function verifyLogin(password) {
      if (password === FAKE_PASSWORD) {
        // 伪造密码：只显示模拟数据
        localStorage.setItem('usingFakeData', 'true');
        showAdminContent();
      } else if (password === ADMIN_PASSWORD) {
        // 真实密码：显示真实数据
        localStorage.setItem('usingFakeData', 'false');
        showAdminContent();
      } else {
        document.getElementById('loginError').classList.remove('hidden');
        document.getElementById('adminPassword').value = '';
      }
    }

    // 登出
    function logout() {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminLoginTime');
      showLoginModal();
    }

    // 绑定事件
    function bindEvents() {
      // 登录按钮
      document.getElementById('loginBtn').addEventListener('click', function() {
        const password = document.getElementById('adminPassword').value;
        verifyLogin(password);
      });

      // 密码输入框回车
      document.getElementById('adminPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const password = document.getElementById('adminPassword').value;
          verifyLogin(password);
        }
      });

      // 刷新按钮
      document.getElementById('refreshBtn').addEventListener('click', loadUsers);
      
      // 清除数据按钮
      document.getElementById('clearRangeBtn').addEventListener('click', clearRangeData);
      
      // 取消清除按钮
      document.getElementById('cancelClearBtn').addEventListener('click', cancelClearData);
      
      // 搜索按钮
      document.getElementById('searchBtn').addEventListener('click', searchUsers);
      
      // 搜索输入框回车
      document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          searchUsers();
        }
      });
      
      // 人格类型筛选
      document.getElementById('personalityFilter').addEventListener('change', filterUsers);
      
      // 导出按钮
      document.getElementById('exportBtn').addEventListener('click', exportData);
      
      // 分页按钮
      document.getElementById('prevPage').addEventListener('click', function() {
        if (currentPage > 1) {
          currentPage--;
          renderUsers();
        }
      });
      
      document.getElementById('nextPage').addEventListener('click', function() {
        const totalPages = Math.ceil(filteredUsers.length / pageSize);
        if (currentPage < totalPages) {
          currentPage++;
          renderUsers();
        }
      });
    }

    // 加载用户数据
    function loadUsers() {
      // 检查是否使用伪造密码
      const usingFakeData = localStorage.getItem('usingFakeData') === 'true';
      
      if (usingFakeData) {
        // 伪造密码：直接加载模拟数据
        loadMockData();
        return;
      }
      
      // 真实密码：从后端API获取数据
      // 显示加载状态
      document.getElementById('userTableBody').innerHTML = `
        <tr>
          <td colspan="5" class="px-6 py-12 text-center text-gray-500">
            <i class="fa fa-spinner fa-spin text-2xl mb-4 block"></i>
            <p>正在从数据库加载...</p>
            <p class="text-sm mt-2" id="loadingStatus">连接服务器中...</p>
          </td>
        </tr>
      `;
      
      console.log('API地址:', API_BASE);
      console.log('正在连接到:', API_BASE + '/api/users');
      
      // 从后端API获取数据
      fetch(API_BASE + '/api/users')
        .then(response => {
          console.log('服务器响应状态:', response.status);
          console.log('服务器响应状态文本:', response.statusText);
          document.getElementById('loadingStatus').textContent = '服务器响应: ' + response.status + ' ' + response.statusText;
          return response.json();
        })
        .then(data => {
          console.log('返回的数据类型:', typeof data);
          console.log('返回的数据:', data);
          console.log('返回的数据JSON:', JSON.stringify(data, null, 2));
          if (data && data.success && data.data) {
            users = data.data;
            filteredUsers = [...users];
            updatePersonalityTypes();
            updateStatistics();
            renderUsers();
            console.log('成功加载真实用户数据:', users.length, '条');
          } else {
            console.log('API返回数据格式不对，使用模拟数据');
            console.log('API返回的完整数据:', JSON.stringify(data, null, 2));
            loadMockData();
          }
        })
        .catch(error => {
          console.error('获取用户数据失败:', error);
          console.error('错误详情:', error.message);
          console.error('错误堆栈:', error.stack);
          document.getElementById('loadingStatus').textContent = '连接失败: ' + error.message;
          
          // 显示错误信息，等待3秒后再显示模拟数据
          setTimeout(() => {
            loadMockData();
          }, 2000);
        });
    }

    // 加载模拟数据（用于演示）
    function loadMockData() {
      console.log('加载模拟数据');
      // 生成少量模拟数据，而不是50个
      users = generateMockData(5); // 只生成5个模拟数据
      filteredUsers = [...users];
      updatePersonalityTypes();
      updateStatistics();
      renderUsers();
      
      // 检查是否使用伪造密码
      const usingFakeData = localStorage.getItem('usingFakeData') === 'true';
      
      // 只有在真实密码模式下才显示警告条
      if (!usingFakeData) {
        // 在页面顶部显示提示信息
        const mainContent = document.getElementById('adminContent');
        const warningDiv = document.createElement('div');
        warningDiv.className = 'bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-3 rounded mb-4';
        warningDiv.innerHTML = '<strong><i class="fa fa-warning mr-2"></i>注意：</strong> 当前显示的是模拟数据。请确认后端服务器是否正常运行，且 API 地址配置正确。';
        mainContent.insertBefore(warningDiv, mainContent.firstChild);
      }
    }

    // 生成模拟数据
    function generateMockData(count = 5) {
      const personalities = [
        'Emotional Player', 'Hidden Personality', 'Challenge Avoider', 'Lying Flat Fish',
        'Rusher', 'Bald Grinder', 'Balanced Player', 'Rational Thinker',
        'Responsible Anchor', 'Self-Deprecating Humorist', 'Confident Competitor',
        'Carry Goat', 'Friend Collector', 'Team Supporter', 'Jokester'
      ];
      
      const mockUsers = [];
      for (let i = 1; i <= count; i++) {
        const personality = personalities[Math.floor(Math.random() * personalities.length)];
        const now = new Date();
        const randomDays = Math.floor(Math.random() * 30);
        const timestamp = new Date(now.getTime() - randomDays * 24 * 60 * 60 * 1000).toISOString();
        
        mockUsers.push({
          id: i,
          gameId: `Player${i}`,
          name: `用户${i}`,
          personality: personality,
          timestamp: timestamp
        });
      }
      return mockUsers;
    }

    // 更新人格类型列表
    function updatePersonalityTypes() {
      const personalitySet = new Set(users.map(user => user.personality));
      personalityTypes = Array.from(personalitySet);
      
      const select = document.getElementById('personalityFilter');
      select.innerHTML = '<option value="all">全部</option>';
      
      personalityTypes.forEach(type => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = type;
        select.appendChild(option);
      });
    }

    // 更新统计信息
    function updateStatistics() {
      document.getElementById('totalUsers').textContent = users.length;
      
      // 计算今日新增
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayUsers = users.filter(user => new Date(user.timestamp) >= today);
      document.getElementById('todayUsers').textContent = todayUsers.length;
      
      // 人格类型数
      document.getElementById('personalityTypes').textContent = personalityTypes.length;
      
      document.getElementById('totalCount').textContent = users.length;
    }

    // 渲染用户数据
    function renderUsers() {
      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = startIndex + pageSize;
      const pageUsers = filteredUsers.slice(startIndex, endIndex);
      
      const tableBody = document.getElementById('userTableBody');
      
      if (pageUsers.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-12 text-center text-gray-500">
              <i class="fa fa-info-circle text-2xl mb-4 block"></i>
              <p>暂无数据</p>
            </td>
          </tr>
        `;
        return;
      }
      
      tableBody.innerHTML = pageUsers.map((user, index) => {
        const userId = user._id || user.id;
        const avatarImage = user.avatarImage || '';
        
        // 判断是预设头像还是自定义头像（data URL）
        let avatarHtml = '';
        if (avatarImage) {
          let avatarSrc = '';
          // 如果是 data URL（自定义头像），直接使用
          if (avatarImage.startsWith('data:')) {
            avatarSrc = avatarImage;
          } else {
            // 如果是文件名（预设头像），加上路径
            avatarSrc = `images/${avatarImage}`;
          }
          
          avatarHtml = `
            <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-200 flex items-center justify-center">
              <img src="${avatarSrc}" alt="头像" class="w-full h-full object-cover" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fa fa-user-circle text-4xl text-gray-400\'></i>'">
            </div>
          `;
        } else {
          // 没有头像时，使用人格类型对应的默认头像
          const defaultAvatar = personalityAvatarMap[user.personality] || '';
          if (defaultAvatar) {
            avatarHtml = `
              <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-200 flex items-center justify-center">
                <img src="images/${defaultAvatar}" alt="头像" class="w-full h-full object-cover" onerror="this.style.display='none';this.parentElement.innerHTML='&lt;i class=\'fa fa-user-circle text-4xl text-gray-400\'&gt;&lt;/i&gt;'">
              </div>
            `;
          } else {
            // 如果也找不到默认头像，显示图标
            avatarHtml = `
              <div class="w-16 h-16 rounded-full bg-gray-100 border-2 border-gray-200 flex items-center justify-center">
                <i class="fa fa-user-circle text-4xl text-gray-400"></i>
              </div>
            `;
          }
        }
        
        return `
        <tr>
          <td class="px-6 py-4 whitespace-nowrap">${userId}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex flex-col items-center">
              <div class="text-sm font-medium text-gray-800 mb-2">${user.gameId}</div>
              ${avatarHtml}
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap">${user.personality}</td>
          <td class="px-6 py-4 whitespace-nowrap">${new Date(user.timestamp).toLocaleString()}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <button class="text-primary hover:text-primary/80 mr-3" data-index="${startIndex + index}" onclick="editUserFromIndex(${startIndex + index})">
              <i class="fa fa-edit"></i>
            </button>
            <button class="text-red-500 hover:text-red-600" data-index="${startIndex + index}" onclick="deleteUserFromIndex(${startIndex + index})">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      `;
      }).join('');
      
      // 更新分页信息
      document.getElementById('showingFrom').textContent = startIndex + 1;
      document.getElementById('showingTo').textContent = Math.min(endIndex, filteredUsers.length);
      document.getElementById('totalCount').textContent = filteredUsers.length;
      
      // 更新分页按钮状态
      document.getElementById('prevPage').disabled = currentPage === 1;
      document.getElementById('nextPage').disabled = endIndex >= filteredUsers.length;
    }

    // 搜索用户
    function searchUsers() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const personalityFilter = document.getElementById('personalityFilter').value;
      
      filteredUsers = users.filter(user => {
        const matchesSearch = user.gameId.toLowerCase().includes(searchTerm) || 
                             user.name.toLowerCase().includes(searchTerm);
        const matchesPersonality = personalityFilter === 'all' || user.personality === personalityFilter;
        return matchesSearch && matchesPersonality;
      });
      
      currentPage = 1;
      renderUsers();
    }

    // 筛选用户
    function filterUsers() {
      searchUsers();
    }

    // 导出数据
    function exportData() {
      const dataStr = JSON.stringify(filteredUsers, null, 2);
      const dataBlob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `ddnet-users-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    // 通过索引删除用户（更安全）
    function deleteUserFromIndex(index) {
      const user = filteredUsers[index];
      if (!user) return;
      
      const userId = user._id || user.id;
      
      if (!confirm('确定要删除这个用户吗？此操作不可撤销。')) {
        return;
      }

      // 如果是模拟数据（没有_id），只从本地移除
      if (!user._id) {
        users = users.filter(u => (u._id || u.id) !== userId);
        filteredUsers = filteredUsers.filter(u => (u._id || u.id) !== userId);
        updatePersonalityTypes();
        updateStatistics();
        renderUsers();
        alert('模拟数据已删除');
        return;
      }

      fetch(API_BASE + '/api/users/' + userId, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('用户删除成功');
          loadUsers();
        } else {
          alert('删除失败：' + data.message);
        }
      })
      .catch(error => {
        console.error('删除用户失败:', error);
        alert('删除失败，请稍后重试');
      });
    }

    // 通过索引编辑用户（更安全）
    function editUserFromIndex(index) {
      const user = filteredUsers[index];
      if (user) {
        alert('用户信息：\n\n游戏ID：' + user.gameId + '\n人格类型：' + user.personality + '\n提交时间：' + new Date(user.timestamp).toLocaleString());
      }
    }

    // 删除用户（保留原来的函数作为备份）
    function deleteUser(userId) {
      const user = users.find(u => (u._id || u.id) == userId);
      if (!user) return;
      
      if (!confirm('确定要删除这个用户吗？此操作不可撤销。')) {
        return;
      }

      // 如果是模拟数据（没有_id），只从本地移除
      if (!user._id) {
        users = users.filter(u => (u._id || u.id) != userId);
        filteredUsers = filteredUsers.filter(u => (u._id || u.id) != userId);
        updatePersonalityTypes();
        updateStatistics();
        renderUsers();
        alert('模拟数据已删除');
        return;
      }

      fetch(API_BASE + '/api/users/' + userId, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('用户删除成功');
          loadUsers();
        } else {
          alert('删除失败：' + data.message);
        }
      })
      .catch(error => {
        console.error('删除用户失败:', error);
        alert('删除失败，请稍后重试');
      });
    }

    // 编辑用户（目前仅显示信息，后续可扩展编辑功能）
    function editUser(userId) {
      const user = users.find(u => (u._id || u.id) == userId);
      if (user) {
        alert('用户信息：\n\n游戏ID：' + user.gameId + '\n人格类型：' + user.personality + '\n提交时间：' + new Date(user.timestamp).toLocaleString());
      }
    }

    // 清除指定日期范围的数据
    function clearRangeData() {
      console.log('清除数据按钮被点击');
      
      // 检查是否使用伪造密码
      const usingFakeData = localStorage.getItem('usingFakeData') === 'true';
      
      if (usingFakeData) {
        alert('演示模式下无法清除数据');
        return;
      }
      
      const beforeDate = document.getElementById('beforeDate').value;
      const afterDate = document.getElementById('afterDate').value;
      
      console.log('beforeDate:', beforeDate);
      console.log('afterDate:', afterDate);
      
      if (!beforeDate && !afterDate) {
        alert('请至少选择一个日期');
        return;
      }
      
      let message = '';
      if (beforeDate && afterDate) {
        message = `确定要删除 ${afterDate} 到 ${beforeDate} 之间的所有数据吗？此操作不可撤销！`;
      } else if (beforeDate) {
        message = `确定要删除 ${beforeDate} 之前的所有数据吗？此操作不可撤销！`;
      } else if (afterDate) {
        message = `确定要删除 ${afterDate} 之后的所有数据吗？此操作不可撤销！`;
      }
      
      if (!confirm(message)) {
        return;
      }

      // 构建查询参数
      let url = API_BASE + '/api/users/range?';
      const params = [];
      if (beforeDate) {
        // 添加时间部分，确保包含当天的所有时间
        const beforeDateWithTime = beforeDate + 'T23:59:59';
        params.push(`beforeDate=${encodeURIComponent(beforeDateWithTime)}`);
      }
      if (afterDate) {
        // 添加时间部分，确保从当天的0点开始
        const afterDateWithTime = afterDate + 'T00:00:00';
        params.push(`afterDate=${encodeURIComponent(afterDateWithTime)}`);
      }
      url += params.join('&');
      
      console.log('请求URL:', url);

      fetch(url, {
        method: 'DELETE'
      })
      .then(response => {
        console.log('响应状态:', response.status);
        return response.json();
      })
      .then(data => {
        console.log('响应数据:', data);
        if (data.success) {
          alert(data.message);
          // 清空日期选择
          document.getElementById('beforeDate').value = '';
          document.getElementById('afterDate').value = '';
          loadUsers();
        } else {
          alert('清除失败：' + (data.message || '未知错误'));
        }
      })
      .catch(error => {
        console.error('清除数据失败:', error);
        alert('清除失败，请稍后重试。错误：' + error.message);
      });
    }
    
    // 取消清除数据
    function cancelClearData() {
      document.getElementById('beforeDate').value = '';
      document.getElementById('afterDate').value = '';
    }
  </script>
</body>
</html>
