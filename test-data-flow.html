<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据流测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 p-8">
  <div class="container mx-auto max-w-3xl">
    <h1 class="text-3xl font-bold mb-8 text-center">数据流测试</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- 测试1: 提交数据 -->
      <div class="bg-white rounded-xl shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <i class="fa fa-paper-plane text-blue-500 mr-2"></i>
          测试1: 提交数据
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-gray-700 mb-2">游戏ID</label>
            <input type="text" id="testGameId" value="test123" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          </div>
          <div>
            <label class="block text-gray-700 mb-2">用户名</label>
            <input type="text" id="testName" value="万事屋" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          </div>
          <div>
            <label class="block text-gray-700 mb-2">人格类型</label>
            <input type="text" id="testPersonality" value="Bald Grinder" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          </div>
          <button id="submitTest" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
            提交测试数据
          </button>
        </div>
        <div id="submitResult" class="mt-4 p-3 border rounded-lg hidden"></div>
      </div>
      
      <!-- 测试2: 获取数据 -->
      <div class="bg-white rounded-xl shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <i class="fa fa-database text-green-500 mr-2"></i>
          测试2: 获取数据
        </h2>
        <button id="fetchTest" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors mb-4">
          获取所有用户数据
        </button>
        <div id="fetchResult" class="mt-4 p-3 border rounded-lg hidden">
          <div id="fetchContent" class="text-sm"></div>
        </div>
      </div>
    </div>
    
    <!-- 测试3: 健康检查 -->
    <div class="mt-6 bg-white rounded-xl shadow-md p-6">
      <h2 class="text-xl font-semibold mb-4 flex items-center">
        <i class="fa fa-heartbeat text-red-500 mr-2"></i>
        测试3: 健康检查
      </h2>
      <button id="healthTest" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition-colors mb-4">
        检查服务器状态
      </button>
      <div id="healthResult" class="mt-4 p-3 border rounded-lg hidden"></div>
    </div>
    
    <!-- 测试4: 生成测试数据 -->
    <div class="mt-6 bg-white rounded-xl shadow-md p-6">
      <h2 class="text-xl font-semibold mb-4 flex items-center">
        <i class="fa fa-users text-purple-500 mr-2"></i>
        测试4: 生成测试数据
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-gray-700 mb-2">生成数量</label>
          <input type="number" id="testDataCount" value="10" min="1" max="50" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-gray-700 mb-2">人格类型</label>
          <select id="testDataPersonality" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            <option value="random">随机分配</option>
            <option value="Emotional Player">Emotional Player</option>
            <option value="Hidden Personality">Hidden Personality</option>
            <option value="Challenge Avoider">Challenge Avoider</option>
            <option value="Lying Flat Fish">Lying Flat Fish</option>
            <option value="Rusher">Rusher</option>
            <option value="Bald Grinder">Bald Grinder</option>
            <option value="Balanced Player">Balanced Player</option>
            <option value="Rational Thinker">Rational Thinker</option>
            <option value="Responsible Anchor">Responsible Anchor</option>
            <option value="Self-Deprecating Humorist">Self-Deprecating Humorist</option>
            <option value="Confident Competitor">Confident Competitor</option>
            <option value="Carry Goat">Carry Goat</option>
            <option value="Friend Collector">Friend Collector</option>
            <option value="Team Supporter">Team Supporter</option>
            <option value="Jokester">Jokester</option>
          </select>
        </div>
        <button id="generateTestData" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition-colors">
          生成并提交测试数据
        </button>
      </div>
      <div id="generateResult" class="mt-4 p-3 border rounded-lg hidden"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://ayin-production.up.railway.app';
    
    // 预设头像列表
    const presetAvatars = [
      '拿刀.png', '彩虹.png', 'ximi.png', '咸鱼.png', '泡泡.png',
      '布偶.png', '猫.png', '美西螈.png', '石像.png', '大dd.png',
      '漂亮.png', '小狗.png', '飞鼠.png', '法师.png', '狐狸.png'
    ];
    
    // 人格类型列表
    const personalityTypes = [
      'Emotional Player', 'Hidden Personality', 'Challenge Avoider',
      'Lying Flat Fish', 'Rusher', 'Bald Grinder', 'Balanced Player',
      'Rational Thinker', 'Responsible Anchor', 'Self-Deprecating Humorist',
      'Confident Competitor', 'Carry Goat', 'Friend Collector',
      'Team Supporter', 'Jokester'
    ];
    
    // 随机选择函数
    function randomChoice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    
    // 生成随机时间戳（最近7天内）
    function randomTimestamp() {
      const now = new Date();
      const daysAgo = Math.floor(Math.random() * 7);
      const hoursAgo = Math.floor(Math.random() * 24);
      const minutesAgo = Math.floor(Math.random() * 60);
      
      now.setDate(now.getDate() - daysAgo);
      now.setHours(now.getHours() - hoursAgo);
      now.setMinutes(now.getMinutes() - minutesAgo);
      
      return now.toISOString();
    }
    
    // 测试1: 提交数据
    document.getElementById('submitTest').addEventListener('click', async () => {
      const gameId = document.getElementById('testGameId').value;
      const name = document.getElementById('testName').value;
      const personality = document.getElementById('testPersonality').value;
      
      const resultDiv = document.getElementById('submitResult');
      resultDiv.className = 'mt-4 p-3 border border-blue-300 bg-blue-50 rounded-lg';
      resultDiv.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 正在提交...';
      
      try {
        const response = await fetch(API_BASE + '/api/users', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ gameId, name, personality })
        });
        
        const data = await response.json();
        console.log('提交响应:', data);
        
        if (data.success) {
          resultDiv.className = 'mt-4 p-3 border border-green-300 bg-green-50 rounded-lg';
          resultDiv.innerHTML = '<i class="fa fa-check-circle text-green-500"></i> 提交成功!<br>' + 
                               '消息: ' + data.message + '<br>' +
                               '用户ID: ' + (data.data._id || 'N/A');
        } else {
          resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
          resultDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 提交失败!<br>' + 
                               '消息: ' + data.message;
        }
      } catch (error) {
        resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
        resultDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 网络错误!<br>' + 
                             '错误: ' + error.message;
      }
    });
    
    // 测试2: 获取数据
    document.getElementById('fetchTest').addEventListener('click', async () => {
      const resultDiv = document.getElementById('fetchResult');
      const contentDiv = document.getElementById('fetchContent');
      resultDiv.className = 'mt-4 p-3 border border-blue-300 bg-blue-50 rounded-lg';
      contentDiv.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 正在获取...';
      
      try {
        const response = await fetch(API_BASE + '/api/users');
        const data = await response.json();
        console.log('获取响应:', data);
        
        if (data.success) {
          resultDiv.className = 'mt-4 p-3 border border-green-300 bg-green-50 rounded-lg';
          contentDiv.innerHTML = '成功获取 ' + data.data.length + ' 条数据<br>' +
                               '<pre class="mt-2 text-xs bg-gray-100 p-2 rounded">' + 
                               JSON.stringify(data.data, null, 2) + 
                               '</pre>';
        } else {
          resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
          contentDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 获取失败!<br>' + 
                               '消息: ' + data.message;
        }
      } catch (error) {
        resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
        contentDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 网络错误!<br>' + 
                             '错误: ' + error.message;
      }
    });
    
    // 测试3: 健康检查
    document.getElementById('healthTest').addEventListener('click', async () => {
      const resultDiv = document.getElementById('healthResult');
      resultDiv.className = 'mt-4 p-3 border border-blue-300 bg-blue-50 rounded-lg';
      resultDiv.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 正在检查...';
      
      try {
        const response = await fetch(API_BASE + '/api/health');
        const data = await response.json();
        
        if (data.success) {
          resultDiv.className = 'mt-4 p-3 border border-green-300 bg-green-50 rounded-lg';
          resultDiv.innerHTML = '<i class="fa fa-check-circle text-green-500"></i> 服务器正常运行!<br>' + 
                               '消息: ' + data.message;
        } else {
          resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
          resultDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 服务器异常!<br>' + 
                               '消息: ' + data.message;
        }
      } catch (error) {
        resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
        resultDiv.innerHTML = '<i class="fa fa-times-circle text-red-500"></i> 无法连接服务器!<br>' + 
                             '错误: ' + error.message;
      }
    });
    
    // 测试4: 生成测试数据
    document.getElementById('generateTestData').addEventListener('click', async () => {
      const count = parseInt(document.getElementById('testDataCount').value) || 10;
      const selectedPersonality = document.getElementById('testDataPersonality').value;
      
      const resultDiv = document.getElementById('generateResult');
      resultDiv.className = 'mt-4 p-3 border border-purple-300 bg-purple-50 rounded-lg';
      resultDiv.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 正在生成并提交 ' + count + ' 条测试数据...';
      
      let successCount = 0;
      let failCount = 0;
      const errors = [];
      
      for (let i = 0; i < count; i++) {
        try {
          // 生成测试数据
          const testData = {
            gameId: `TestUser_${Date.now()}_${i}`,
            name: `测试用户${i + 1}`,
            personality: selectedPersonality === 'random' ? randomChoice(personalityTypes) : selectedPersonality,
            avatarImage: randomChoice(presetAvatars),
            timestamp: randomTimestamp()
          };
          
          // 提交到数据库
          const response = await fetch(API_BASE + '/api/users', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(testData)
          });
          
          const data = await response.json();
          
          if (data.success) {
            successCount++;
            console.log(`第 ${i + 1} 条数据提交成功:`, testData);
          } else {
            failCount++;
            errors.push(`第 ${i + 1} 条: ${data.message}`);
            console.error(`第 ${i + 1} 条数据提交失败:`, data.message);
          }
        } catch (error) {
          failCount++;
          errors.push(`第 ${i + 1} 条: ${error.message}`);
          console.error(`第 ${i + 1} 条数据提交异常:`, error);
        }
        
        // 稍微延迟一下，避免请求过快
        await new Promise(resolve => setTimeout(resolve, 100));
      }
      
      // 显示结果
      let resultHTML = `<i class="fa fa-check-circle text-green-500"></i> 完成!<br>`;
      resultHTML += `成功: ${successCount} 条<br>`;
      resultHTML += `失败: ${failCount} 条`;
      
      if (errors.length > 0) {
        resultHTML += `<br><br>错误详情:<br>`;
        resultHTML += `<pre class="mt-2 text-xs bg-gray-100 p-2 rounded max-h-40 overflow-y-auto">${errors.join('\n')}</pre>`;
      }
      
      if (successCount > 0) {
        resultDiv.className = 'mt-4 p-3 border border-green-300 bg-green-50 rounded-lg';
      } else {
        resultDiv.className = 'mt-4 p-3 border border-red-300 bg-red-50 rounded-lg';
      }
      
      resultDiv.innerHTML = resultHTML;
    });
  </script>
</body>
</html>
